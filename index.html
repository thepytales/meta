<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Meta Quest 2 Environment</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script type="module" src="script.js"></script>
</head>
<body>
    <a-scene 
        physics="driver: local; debug: false; gravity: -9.8"
        xr-mode-ui="enabled: true" 
        renderer="antialias: false; colorManagement: true; sortObjects: false;"
        cursor="rayOrigin: mouse">

        <a-entity 
            gaussian_splatting="src: raum.ply" 
            position="0 0 0" 
            rotation="0 0 0">
        </a-entity>

        <a-plane 
            position="0 -2 0" 
            rotation="-90 0 0" 
            width="20" 
            height="20" 
            visible="false" 
            static-body>
        </a-plane>

        <a-entity position="0.5 -2 -1.2">
            <a-box position="0 0.4 0" width="0.6" height="0.8" depth="0.6" color="#111111" static-body></a-box>
            <a-box position="0 0.85 0" width="1.2" height="0.1" depth="1.0" color="#222222" static-body></a-box>
            
            <a-box class="grabbable" position="-0.3 1.2 0" scale="0.15 0.15 0.15" color="#87CEFA" dynamic-body></a-box>
            <a-sphere class="grabbable" position="0.3 1.2 0" radius="0.1" color="#FF69B4" dynamic-body></a-sphere>
            <a-cylinder class="grabbable" position="0 1.5 0" radius="0.08" height="0.2" color="#98FB98" dynamic-body></a-cylinder>
        </a-entity>

        <a-entity id="rig" movement-controls="controls: gamepad, keyboard; speed: 0.15" position="0 -2 0">
            <a-entity 
                id="camera" 
                camera 
                position="0 1.6 0" 
                look-controls>
            </a-entity>
            
            <a-entity 
                id="left-hand"
                oculus-touch-controls="hand: left" 
                raycaster="objects: .grabbable; far: 3; showLine: true"
                grabber>
            </a-entity>
            
            <a-entity 
                id="right-hand"
                oculus-touch-controls="hand: right" 
                raycaster="objects: .grabbable; far: 3; showLine: true"
                grabber>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
        
    </a-scene>
</body>
</html>
